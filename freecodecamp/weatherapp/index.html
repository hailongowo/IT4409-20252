<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="weather-container">
        <header class="search-section">
            <h1>Weather Explorer</h1>
            <div class="controls">
                <select id="city-select">
                    <option value="">-- Choose a city --</option>
                    <option value="new york">New York</option>
                    <option value="los angeles">Los Angeles</option>
                    <option value="chicago">Chicago</option>
                    <option value="paris">Paris</option>
                    <option value="tokyo">Tokyo</option>
                    <option value="london">London</option>
                </select>
                <button id="get-weather-btn">Get Weather</button>
            </div>
        </header>

        <section id="weather-card" class="weather-card">
            <div class="main-info">
                <h2 id="location">Select a city</h2>
                <div class="temp-display">
                    <img id="weather-icon" src="" alt="Weather Icon" style="display: none;">
                    <div class="temp-text">
                        <span id="main-temperature">--</span><span class="unit">°C</span>
                    </div>
                </div>
                <p id="weather-main" class="weather-condition">--</p>
            </div>

            <div class="details-grid">
                <div class="detail-item">
                    <span class="label">Feels Like</span>
                    <span class="value"><span id="feels-like">--</span>°C</span>
                </div>
                <div class="detail-item">
                    <span class="label">Humidity</span>
                    <span class="value"><span id="humidity">--</span>%</span>
                </div>
                <div class="detail-item">
                    <span class="label">Wind Speed</span>
                    <span class="value"><span id="wind">--</span> m/s</span>
                </div>
                <div class="detail-item">
                    <span class="label">Wind Gust</span>
                    <span class="value"><span id="wind-gust">--</span> m/s</span>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
