<!DOCTYPE html>
<html lang = "vi">
    <head>
        <meta charset = "UTF-8">
        <title>

        <main>

                    <button type="button">
                        <img src = "https://cdn-icons-png.freepik.com/512/566/566100.png" height = "10px" width = "10px">
                    </button>
                    <br><br>
                    <button type="submit">Tìm trên Google</button>

            </section>
